name: CI/CD
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Package template assets
        env:
          TEMPLATE_VERSION: ${{ github.sha }}
        run: |
          npm run template:package
          for tier in basic pro enterprise; do
            for format in zip tar; do
              FILE="template-files/$tier/saas-starter-$tier-v${TEMPLATE_VERSION}.${format}"
              if [ ! -f "$FILE" ]; then
                echo "❌ Missing packaged asset: $FILE"
                exit 1
              fi
            done
          done

  security:
    # Dependency review requires base + head refs, which only exist on PR events.
    # CodeQL push-time scanning is handled by GitHub default code-scanning setup.
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Dependency review
        uses: actions/dependency-review-action@v4

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

  deploy:
    needs: [quality]
    # Opt-in: set repo variable ENABLE_VERCEL_DEPLOY=true and configure
    # secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to enable.
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      vars.ENABLE_VERCEL_DEPLOY == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
