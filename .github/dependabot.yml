# Dependabot configuration — optimized to reduce CI minutes
# Monthly updates, grouped aggressively, limited PRs

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    # eslint 10 breaks eslint-plugin-react-hooks (only supports ^9)
    # Ignore major eslint bumps until the plugin ecosystem catches up
    ignore:
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
    groups:
      all-dependencies:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
